{{- if and .Site.Params.giscusRepo .Site.Params.giscusRepoId .Site.Params.giscusCategory .Site.Params.giscusCategoryId }}
<!-- Giscus Comment System -->
<div class="giscus" style="margin-top: 2rem;"></div>
<script src="https://giscus.app/client.js"
    data-repo="{{ .Site.Params.giscusRepo }}"
    data-repo-id="{{ .Site.Params.giscusRepoId }}"
    data-category="{{ .Site.Params.giscusCategory }}"
    data-category-id="{{ .Site.Params.giscusCategoryId }}"
    data-mapping="pathname"
    data-strict="0"
    data-reactions-enabled="1"
    data-emit-metadata="0"
    data-input-position="top"
    data-theme="preferred_color_scheme"
    data-lang="zh-CN"
    data-loading="lazy"
    crossorigin="anonymous"
    async>
</script>
{{- end }}
